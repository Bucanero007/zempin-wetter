<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zempin Wetter</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial, sans-serif;
  background:#e8f5ff;
  text-align:center;
}

.card{
  max-width:400px;
  margin:30px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.temp{
  font-size:64px;
  font-weight:bold;
}

.small{
  font-size:18px;
}
</style>
</head>

<body>

<div class="card">
<h1>🌊 Zempin Wetter</h1>

<div id="weather">
Lade Wetterdaten...
</div>
</div>

<script>

const lat = 54.07;
const lon = 13.96;
const days = 14;

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&forecast_days=${days}`)
.then(response => response.json())
.then(data => {
let forecast = "<h3>📅 14-Tage-Vorschau</h3>";

for(let i = 0; i < data.daily.time.length; i++){

forecast += `
<p class="small">
${data.daily.time[i]}
<br>
🌡 ${Math.round(data.daily.temperature_2m_max[i])}° /
${Math.round(data.daily.temperature_2m_min[i])}°
&nbsp;&nbsp;
🌧 ${data.daily.precipitation_probability_max[i]}%
</p>
`;

}
document.getElementById("weather").innerHTML = `
<div class="temp">${data.current.temperature_2m}°C</div>

<p class="small">
Gefühlt: ${data.current.apparent_temperature}°C
</p>

<p class="small">
💨 Wind: ${data.current.wind_speed_10m} km/h
</p>

<p class="small">
🧭 Richtung: ${data.current.wind_direction_10m}°
</p>

<p class="small">
💧 Luftfeuchte: ${data.current.relative_humidity_2m} %
</p>

${forecast}
`;

});

</script>

</body>
</html>
