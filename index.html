<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zempin Wetter</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial, sans-serif;
  background:#e8f5ff;
  text-align:center;
}

.card{
  max-width:400px;
  margin:30px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.temp{
  font-size:64px;
  font-weight:bold;
}

.small{
  font-size:18px;
}
</style>
</head>

<body>

<div class="card">
<h1>🌊 Zempin Wetter</h1>

<div id="weather">
Lade Wetterdaten...
</div>
</div>

<script>

const lat = 54.07;
const lon = 13.96;
const days = 14;

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code&forecast_days=${days}`)
.then(response => response.json())
.then(data => {
let dir = data.current.wind_direction_10m;

let windText = "";

if(dir >= 337.5 || dir < 22.5) windText = "N ⬆️";
else if(dir < 67.5) windText = "NO ↗️";
else if(dir < 112.5) windText = "O ➡️";
else if(dir < 157.5) windText = "SO ↘️";
else if(dir < 202.5) windText = "S ⬇️";
else if(dir < 247.5) windText = "SW ↙️";
else if(dir < 292.5) windText = "W ⬅️";
else windText = "NW ↖️";
let strandindex = "🟡 Gut";

if(
  data.current.temperature_2m >= 20 &&
  data.current.wind_speed_10m < 20
){
  strandindex = "🟢 Perfekt";
}

if(
  data.current.wind_speed_10m > 30
){
  strandindex = "🔴 Sehr windig";
}
let forecast = "<h3>📅 14-Tage-Vorschau</h3>";
let icon = "";
for(let i = 0; i < data.daily.time.length; i++){
let rain = data.daily.precipitation_probability_max[i];

let icon = "☀️";

if(rain >= 20) icon = "🌤️";
if(rain >= 40) icon = "🌦️";
if(rain >= 60) icon = "🌧️";
if(rain >= 80) icon = "⛈️";
forecast += `
<p class="small">
${new Date(data.daily.time[i]).toLocaleDateString('de-DE', {
weekday: 'short',
day: '2-digit',
month: '2-digit'
})}
 ${icon}
<br>
⬆️ ${Math.round(data.daily.temperature_2m_max[i])}°
&nbsp;&nbsp;
⬇️ ${Math.round(data.daily.temperature_2m_min[i])}°
&nbsp;&nbsp;
🌧 ${data.daily.precipitation_probability_max[i]}%
</p>
`;

}
document.getElementById("weather").innerHTML = `
<div class="temp">${data.current.temperature_2m}°C</div>

<p class="small">
Gefühlt: ${data.current.apparent_temperature}°C
</p>

<p class="small">
💨 Wind: ${data.current.wind_speed_10m} km/h
</p>

<p class="small">
🧭 Windrichtung: ${windText}
</p>

<p class="small">
💧 Luftfeuchte: ${data.current.relative_humidity_2m} %
</p>
<p class="small">
🏖️ Strandindex: ${strandindex}
</p>
<p class="small">
🌊 Ostsee: Lade Wassertemperatur...
</p>
${forecast}
`;

});

</script>

</body>
</html>
