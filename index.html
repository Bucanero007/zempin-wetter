<!DOCTYPE html>
<html lang="de">
<head>
<link rel="apple-touch-icon" href="IMG_2646.png">
<link rel="icon" href="IMG_2646.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zempin Wetter</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial, sans-serif;
  background:#e8f5ff;
  text-align:center;
}

.card{
  max-width:400px;
  margin:30px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.temp{
  font-size:64px;
  font-weight:bold;
  color:#0077cc;
}
.water-temp{
  font-size:22px;
  font-weight:bold;
}
.small{
  font-size:18px;
}
.info-box{
  background:linear-gradient(#f7fbff,#e8f5ff);
  border:1px solid #d7eaf7;
  border-radius:15px;
  padding:12px;
  margin:15px 0;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
@media (prefers-color-scheme: dark){

body{
  background:#121212;
  color:#ffffff;
}

.card{
  background:#1f1f1f;
  color:#ffffff;
}

.info-box{
  background:linear-gradient(#2a2a2a,#202020);
  border:1px solid #444;
}

.temp{
  color:#4da6ff;
}

a{
  color:#7ab8ff;
}

}
</style>
</head>

<body>

<div class="card">
<div class="header-box">
<img src="IMG_2609.png"
style="width:100%;border-radius:15px;margin-bottom:15px;">
<div id="oceaninfo">
<div id="weather">
Lade Wetterdaten...
</div>
</div>

<script>

const lat = 54.07;
const lon = 13.96;
const days = 14;

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset,sunshine_duration,weather_code&forecast_days=${days}&timezone=Europe/Berlin`)
.then(response => response.json())
.then(data => {
let dir = data.current.wind_direction_10m;
window.windSpeed = data.current.wind_speed_10m;
let windwarnung = "";

if(window.windSpeed > 40)
  windwarnung = "🚨 Starker Wind am Strand";

else if(window.windSpeed > 25)
  windwarnung = "⚠️ Frischer Wind am Strand";
let windText = "";

if(dir >= 337.5 || dir < 22.5) windText = "N ⬆️";
else if(dir < 67.5) windText = "NO ↗️";
else if(dir < 112.5) windText = "O ➡️";
else if(dir < 157.5) windText = "SO ↘️";
else if(dir < 202.5) windText = "S ⬇️";
else if(dir < 247.5) windText = "SW ↙️";
else if(dir < 292.5) windText = "W ⬅️";
else windText = "NW ↖️";
let strandindex = '<span style="color:orange;">🟡 Gut</span>';

if(
  data.current.temperature_2m >= 20 &&
  data.current.wind_speed_10m < 20
){
  strandindex = '<span style="color:green;">🟢 Perfekt</span>';
}

if(
  data.current.wind_speed_10m > 30
){
  strandindex = '<span style="color:red;">🔴 Sehr windig</span>';
}
let forecast = "<h3>📅 14-Tage-Vorschau</h3>";
let icon = "";
for(let i = 0; i < data.daily.time.length; i++){
let rain = data.daily.precipitation_probability_max[i];
let regenampel = "🟢";

if(rain >= 30) regenampel = "🟠";
if(rain >= 60) regenampel = "🔴";
let rainColor = "green";

if(rain >= 30) rainColor = "orange";
if(rain >= 60) rainColor = "red";

let icon = "☀️";

if(rain >= 20) icon = "🌤️";
if(rain >= 40) icon = "🌦️";
if(rain >= 60) icon = "🌧️";
if(rain >= 80) icon = "⛈️";
forecast += `
<p class="small">
${new Date(data.daily.time[i]).toLocaleDateString('de-DE', {
weekday: 'short',
day: '2-digit',
month: '2-digit'
})}
 ${icon}
<br>
⬆️ ${Math.round(data.daily.temperature_2m_max[i])}°
&nbsp;&nbsp;
⬇️ ${Math.round(data.daily.temperature_2m_min[i])}°
&nbsp;&nbsp;
<span style="color:${rainColor};">
${regenampel}
<span style="color:${rainColor};">
🌧 ${rain}%
</span>
<br>
☀️ ${Math.round(data.daily.sunshine_duration[i] / 3600)} h
</p>
<hr style="border:none;border-top:1px solid #ddd;opacity:0.5;">
`;

}
document.getElementById("weather").innerHTML = `
<div class="temp">${data.current.temperature_2m}°C</div>

<p class="small">
Gefühlt: ${data.current.apparent_temperature}°C
</p>

<p class="small">
💨 Wind: ${data.current.wind_speed_10m} km/h
</p>

<p class="small">
🧭 Windrichtung: ${windText}
</p>

<p class="small">
💧 Luftfeuchte: ${data.current.relative_humidity_2m} %
</p>
<div class="info-box">

<p class="water-temp" id="watertemp">
🌊 Ostsee: Lade Wassertemperatur...
</p>

<p class="small">
🏖️ Strandindex: ${strandindex}
</p>
<p class="small" id="badeampel">
🏊 Badeampel: Wird berechnet...
</p>
<p class="small">
${windwarnung}
</p>
<p class="small">
🌅 Aufgang:
${new Date(data.daily.sunrise[0]).toLocaleTimeString('de-DE',{
hour:'2-digit',
minute:'2-digit'
})}
</p>

<p class="small">
🌄 Untergang:
${new Date(data.daily.sunset[0]).toLocaleTimeString('de-DE',{
hour:'2-digit',
minute:'2-digit'
})}
</p>

</div>
${forecast}
`;

});
fetch("https://marine-api.open-meteo.com/v1/marine?latitude=54.07&longitude=13.96&current=sea_surface_temperature")
.then(response => response.json())
.then(data => {

let wasser = data.current.sea_surface_temperature;

document.getElementById("watertemp").innerHTML =
`🌊 Ostsee: ${wasser}°C`;

let badeampel = "🔵 Erfrischend";

if(wasser >= 17) badeampel = "🟡 Frisch";
if(wasser >= 20) badeampel = "🟢 Perfekt";

// Wind berücksichtigt
if(window.windSpeed > 20) badeampel = "🟠 Windig";
if(window.windSpeed > 30) badeampel = "🔴 Sehr windig";

document.getElementById("badeampel").innerHTML =
`🏊 Badeampel: ${badeampel}`;

});
</script>

</body>
</html>
